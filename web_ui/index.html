<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Agent Web UI — _Metrics_</title>
  <style>
    body{font-family: Arial, Helvetica, sans-serif; padding:1rem}
    #log{white-space:pre-wrap; background:#f7f7f7; padding:1rem; height:60vh; overflow:auto}
    textarea{width:100%;height:5rem}
  </style>
</head>
<body>
  <h2>Agent Web UI (local)</h2>
  <div id="log">Cargando...</div>
  <form id="f">
    <label>Symbol: <input id="symbol" value="BTCUSDT"></label>
    <br/>
    <textarea id="msg" placeholder="Escribe tu mensaje aquí..."></textarea>
    <br/>
    <button type="submit">Enviar</button>
  </form>

  <script>
    const log = document.getElementById('log');
    const f = document.getElementById('f');
    const msg = document.getElementById('msg');
    const symbol = document.getElementById('symbol');

    function append(s){ log.textContent += '\n' + s; log.scrollTop = log.scrollHeight }

    async function ping(){
      try{
        const r = await fetch('/health');
        const j = await r.json();
        log.textContent = 'API: ' + JSON.stringify(j) + '\n---\n';
      }catch(e){ log.textContent = 'No se pudo conectar a /health: '+e }
    }
    ping();

    f.addEventListener('submit', async (ev)=>{
      ev.preventDefault();
      append('\n---\nTú: ' + msg.value);
      append('Enviando a /agent/chat...');
      try{
        const res = await fetch('/agent/chat', {
          method:'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({message: msg.value, symbol: symbol.value})
        });
        const j = await res.json();
        append('Respuesta (backend='+j.backend+'):\n' + (j.reply||JSON.stringify(j)) );
      }catch(e){ append('Error fetch: '+e) }
    });
  </script>
</body>
</html>
